<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Summary Challenge</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/container.css" />
    <link rel="stylesheet" href="./css/card.css" />
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/media.css">
<link rel="icon" href="./src/images/favicon-32x32.png" type="image/x-icon">

  </head>
  <body>
    <main class="container">
      <select id="language-select">
        <option value="pt">Português</option>
        <option value="en">English</option>
      </select>
        <section class="card">
          <div class="card-hero">
            <img src="./src/images/illustration-hero.svg" alt="Hero Image" />
          </div>

          <div class="card-content">
            <header class="card-header">
              <h1 data-i18n="title">Order Summary</h1>
              <p data-i18n="description">You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
            </header>

            <div class="plan-box">
              <div class="plan-info">
                <div class="plan-icon">
                  <img src="./src/images/icon-music.svg" alt="Music Icon" />
                </div>

                <div class="plan-text">
                  <h2 data-i18n="plan-title">Annual Plan</h2>
                  <p><span data-i18n="plan-price">$59.99/year</span></p>
                </div>
              </div>

              <a href="#" class="change-link" data-i18n="chg-lnk">Change</a>
            </div>

            <div class="card-actions">
              <p class="btn-primary" data-i18n="button-primary">Proceed to Payment</p>

              <p class="btn-secondary" data-i18n="button-secondary">Cancel Order</p>
            </div>
          </div>
        </section>
    </main>
      <script src="./js/i18n.js"></script>
  </body>
</html>
