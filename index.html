<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Summary Challenge</title>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <div class="card-hero">
          <img src="./src/images/illustration-hero.svg" />
        </div>

        <div class="card-content">
          <header class="card-header">
            <h1>Order Summary</h1>
            <p>You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
          </header>

          <div class="plan-box">
            <div class="plan-info">
              <div class="plan-icon">
                <img src="./src/images/icon-music.svg" alt="Music Icon" />
              </div>

              <div class="plan-text">
                <h2>Annual Plan</h2>
                <p>$59.99/year</p>
              </div>
            </div>

            <a href="#" class="change-link">Change</a>
          </div>

          <div class="card-actions">
            <button class="btn-primary">Proceed to Payment</button>

            <button class="btn-secondary">Cancel Order</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
